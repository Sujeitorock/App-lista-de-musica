<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>SujeitoRock — Peça sua Música</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#000000;--bg2:#111111;--bg3:#1e1e1e;--red:#c0392b;--red2:#e74c3c;--white:#fff;--gray:#666;--gray2:#999;--border:rgba(255,255,255,0.08);--radius:12px}
html,body{background:var(--bg);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden}
#root{max-width:480px;margin:0 auto;min-height:100vh;position:relative}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--red);color:white;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
.screen{min-height:100vh;display:flex;flex-direction:column}
.fade-in{animation:fadeIn 0.25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* HOME HEADER */
.home-header{position:relative;padding:28px 20px 20px;background:var(--bg);overflow:hidden}
.home-header::before{content:none}
.header-inner{display:flex;align-items:center;gap:14px;position:relative;z-index:1}
.header-photo{width:72px;height:72px;border-radius:50%;border:2px solid var(--red);object-fit:cover;object-position:center top;flex-shrink:0;box-shadow:0 0 0 4px rgba(192,57,43,0.15)}
.header-right{flex:1;min-width:0}
.logo-img{width:100%;max-width:200px;display:block;mix-blend-mode:screen}
.header-tagline{font-size:12px;color:var(--gray2);margin-top:4px;letter-spacing:0.5px}

/* MULTI SELECT */
.select-toggle{background:none;border:1px solid var(--border);color:var(--gray2);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;flex-shrink:0;transition:all 0.2s}
.select-toggle.active{border-color:var(--red);color:var(--red2)}
.song-item.song-selected{border-color:var(--red);background:rgba(192,57,43,0.12)}
.song-check{width:24px;height:24px;border-radius:6px;border:2px solid var(--gray);flex-shrink:0;margin-right:8px;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.15s}
.song-selected .song-check{background:var(--red);border-color:var(--red);color:white}
.select-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:2px solid var(--red);padding:12px 20px;z-index:300;display:flex;align-items:center;gap:12px;animation:slideUp 0.2s ease}
@keyframes slideUp{from{transform:translateX(-50%) translateY(100%)}to{transform:translateX(-50%) translateY(0)}}
.select-bar-info{flex:1;font-size:13px;font-weight:700;color:var(--white)}
.select-bar-info span{color:var(--red2)}
.btn-request-all{background:var(--red);color:white;border:none;border-radius:8px;padding:12px 18px;font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:1px;cursor:pointer;white-space:nowrap}
/* DRAG DROP ADMIN */
.song-del-btn{background:none;border:none;color:var(--gray);font-size:15px;cursor:pointer;padding:4px 6px;flex-shrink:0;transition:color 0.2s;line-height:1}
.song-del-btn:hover{color:var(--red2)}
.song-move-btn{background:none;border:1px solid var(--border);color:var(--gray2);font-size:11px;cursor:pointer;padding:4px 8px;border-radius:6px;flex-shrink:0;font-family:'Barlow',sans-serif;font-weight:700;transition:all 0.2s;white-space:nowrap}
.song-move-btn.active{border-color:var(--red);color:var(--red2)}
.move-song-panel{background:var(--bg2);border:1px solid rgba(192,57,43,0.4);border-radius:10px;padding:10px 12px;margin:2px 0 6px;animation:fadeIn 0.15s ease}
.move-song-panel-title{font-size:11px;color:var(--gray2);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.move-pl-pills{display:flex;flex-wrap:wrap;gap:6px}
.move-pl-pill{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:5px 12px;color:var(--white);font-size:12px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;transition:all 0.2s}
.move-pl-pill:hover{border-color:var(--red);color:var(--red2);background:rgba(192,57,43,0.1)}
.delete-pl-btn{background:none;border:none;color:var(--gray);font-size:16px;cursor:pointer;padding:4px 8px;transition:color 0.2s;flex-shrink:0}
.delete-pl-btn:hover{color:var(--red2)}
.search-bar{margin:0 20px 16px;position:relative}
.search-bar input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:30px;padding:12px 20px 12px 44px;color:var(--white);font-family:'Barlow',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s}
.search-bar input::placeholder{color:var(--gray)}
.search-bar input:focus{border-color:var(--red)}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--gray);font-size:18px}
.search-results{padding:0 20px 20px}
.search-result-item{display:flex;align-items:center;padding:14px 16px;background:var(--bg3);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:background 0.2s;border:1px solid var(--border)}
.search-result-item:hover{background:#1a0808}
.search-result-info{flex:1}
.search-result-title{font-weight:600;font-size:15px}
.search-result-artist{color:var(--gray2);font-size:13px;margin-top:2px}
.search-result-pl{font-size:11px;color:var(--red2);background:rgba(192,57,43,0.15);padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap;margin-left:8px}

/* PLAYLISTS */
.section-title{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:2px;color:var(--gray2);padding:0 20px 12px;text-transform:uppercase}
.playlists-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 20px 20px}
.playlist-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:20px 16px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.playlist-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--red);transform:scaleX(0);transition:transform 0.2s}
.playlist-card:hover::after{transform:scaleX(1)}
.playlist-card:active{transform:scale(0.97)}
.playlist-card.special{background:linear-gradient(135deg,#1a0000,#2a0808);border-color:rgba(192,57,43,0.3)}
.playlist-emoji{font-size:30px;display:block;margin-bottom:8px}
.playlist-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;text-transform:uppercase;letter-spacing:0.5px;line-height:1.2}
.playlist-count{font-size:12px;color:var(--gray2);margin-top:4px}

/* FOOTER */
.home-footer{margin-top:auto;padding:24px 20px 36px;border-top:1px solid var(--border)}
.social-links{display:flex;gap:8px;margin-bottom:16px;justify-content:center;flex-wrap:wrap}
.social-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;color:var(--white);text-decoration:none;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s}
.social-btn:hover{border-color:var(--red);color:var(--red2)}
.social-btn svg{width:15px;height:15px}
.event-banner{background:linear-gradient(135deg,var(--red),#8b1a1a);border-radius:var(--radius);padding:16px 20px;text-align:center;cursor:pointer;transition:transform 0.2s}
.event-banner:hover{transform:scale(1.02)}
.event-banner-title{font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px;margin-bottom:4px}
.event-banner-sub{font-size:12px;opacity:0.85}

/* SCREEN HEADER */
.screen-header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:none;color:var(--white);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s}
.back-btn:hover{background:var(--red)}
.screen-header-info{flex:1}
.screen-header-title{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:1px}
.screen-header-sub{font-size:12px;color:var(--gray2)}

/* PLAYLIST */
.playlist-search{padding:12px 20px}
.playlist-search input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 16px;color:var(--white);font-family:'Barlow',sans-serif;font-size:14px;outline:none}
.playlist-search input:focus{border-color:var(--red)}
.playlist-search input::placeholder{color:var(--gray)}
.songs-list{padding:8px 20px}
.song-item{display:flex;align-items:center;padding:14px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all 0.2s}
.song-item:hover{border-color:var(--red);background:#1a0808}
.song-item:active{transform:scale(0.98)}
.song-num{width:28px;height:28px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--gray2);flex-shrink:0;margin-right:12px}
.song-info{flex:1}
.song-title{font-weight:600;font-size:15px}
.song-artist{color:var(--gray2);font-size:13px;margin-top:2px}
.song-arrow{color:var(--gray);font-size:20px}
.suggest-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:calc(100% - 40px);margin:10px 20px 30px;padding:14px;background:transparent;border:1px dashed rgba(192,57,43,0.4);border-radius:10px;color:var(--red2);font-family:'Barlow',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s}
.suggest-btn:hover{background:rgba(192,57,43,0.08);border-color:var(--red)}

/* STEPS */
.step-screen{padding:0 20px 30px}
.step-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.3);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;color:var(--red2);letter-spacing:1px;text-transform:uppercase;margin:24px 0 16px}
.step-song-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:24px;display:flex;align-items:center;gap:12px}
.step-song-icon{width:44px;height:44px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.step-song-title{font-weight:700;font-size:16px}
.step-song-artist{color:var(--gray2);font-size:13px}
.field{margin-bottom:16px;position:relative}
.field label{display:block;font-size:13px;font-weight:700;color:var(--gray2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.field input,.field textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--white);font-family:'Barlow',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s;resize:none}
.field input:focus,.field textarea:focus{border-color:var(--red)}
.field input::placeholder,.field textarea::placeholder{color:var(--gray)}
.optional{font-size:11px;color:var(--gray);font-weight:400;text-transform:none;letter-spacing:0;margin-left:4px}

/* AUTOCOMPLETE */
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--red);border-radius:0 0 8px 8px;z-index:200;max-height:160px;overflow-y:auto}
.autocomplete-item{padding:10px 16px;font-size:14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.15s}
.autocomplete-item:hover{background:rgba(192,57,43,0.15);color:var(--red2)}
.autocomplete-item:last-child{border-bottom:none}

/* BUTTONS */
.btn-primary{width:100%;background:var(--red);color:white;border:none;border-radius:10px;padding:16px;font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:2px;cursor:pointer;transition:all 0.2s;margin-top:8px}
.btn-primary:hover{background:var(--red2);transform:translateY(-1px)}
.btn-primary:active{transform:scale(0.98)}
.btn-secondary{width:100%;background:transparent;color:var(--gray2);border:1px solid var(--border);border-radius:10px;padding:14px;font-family:'Barlow',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;margin-top:8px}
.btn-secondary:hover{color:var(--white);border-color:var(--gray2)}

/* PIX */
.pix-amounts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.pix-amount-btn{background:var(--bg3);border:2px solid var(--border);border-radius:10px;padding:16px;color:var(--white);font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:1px;cursor:pointer;transition:all 0.2s;text-align:center}
.pix-amount-btn:hover{border-color:var(--red);color:var(--red2)}
.pix-amount-btn.selected{border-color:var(--red);background:rgba(192,57,43,0.15);color:var(--red2)}
.pix-label{display:block;font-family:'Barlow',sans-serif;font-size:11px;color:var(--gray2);font-weight:600;letter-spacing:0;text-transform:uppercase;margin-top:2px}
.pix-key-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px;margin:16px 0;display:none}
.pix-key-box.show{display:block}
.pix-key-label{font-size:12px;color:var(--gray2);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px}
.pix-key-value{font-size:15px;font-weight:600;word-break:break-all;margin-bottom:10px}
.copy-btn{background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.3);border-radius:8px;padding:8px 16px;color:var(--red2);font-family:'Barlow',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s}
.copy-btn:hover{background:rgba(192,57,43,0.25)}
.pix-qr-wrap{text-align:center;margin:16px 0 8px}
.pix-qr-wrap canvas,.pix-qr-wrap img{border-radius:8px;display:inline-block}
.pix-qr-label{font-size:11px;color:var(--gray2);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-top:8px}
.outro-row{display:flex;gap:8px;margin-top:8px}
.outro-row input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:white;font-family:'Barlow',sans-serif;font-size:16px;font-weight:600;outline:none}
.outro-row input:focus{border-color:var(--red)}
.wallet-btns{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.wallet-btn{flex:1;min-width:80px;padding:10px 8px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--white);font-family:'Barlow',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;text-align:center;display:flex;align-items:center;justify-content:center;gap:4px}
.wallet-btn:hover{border-color:var(--red2);background:rgba(192,57,43,0.1)}

/* CONFIRM */
.confirm-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:100vh;padding:40px 30px}
.confirm-icon{font-size:72px;margin-bottom:20px;animation:bounce 0.6s ease}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.confirm-title{font-family:'Bebas Neue',cursive;font-size:42px;letter-spacing:3px;margin-bottom:10px}
.confirm-sub{color:var(--gray2);font-size:15px;line-height:1.5;margin-bottom:12px}
.confirm-insta{background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:700;font-size:17px;margin-bottom:30px}

/* ADMIN LOGIN */
.admin-login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 30px}
.admin-lock{font-size:48px;margin-bottom:20px}
.admin-login-title{font-family:'Bebas Neue',cursive;font-size:32px;letter-spacing:3px;margin-bottom:8px}
.admin-login-sub{color:var(--gray2);font-size:14px;margin-bottom:30px;text-align:center}

/* ADMIN */
.admin-screen{display:flex;flex-direction:column;min-height:100vh;padding-bottom:80px}
.admin-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px}
.admin-logo{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:2px;color:var(--red2)}
.admin-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--gray2);text-transform:uppercase;letter-spacing:1px;flex:1}
.logout-btn{background:none;border:1px solid var(--border);color:var(--gray2);padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif}
.admin-content{flex:1;padding:16px 20px;overflow-y:auto}
.admin-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:1000}
.admin-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;background:none;border:none;color:var(--gray);font-family:'Barlow',sans-serif;font-size:10px;font-weight:600;cursor:pointer;transition:color 0.2s;text-transform:uppercase;letter-spacing:0.5px}
.admin-nav-btn .nav-icon{font-size:20px}
.admin-nav-btn.active{color:var(--red2)}

/* REQUEST CARD */
.request-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.request-card.wish-request{border-color:rgba(192,57,43,0.5);background:rgba(192,57,43,0.08)}
.request-card.has-pix{border-color:rgba(192,57,43,0.4);background:linear-gradient(135deg,#1a0808,#1e1e1e)}
.req-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.pix-badge{background:var(--red);color:white;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:0.5px}
.req-name{font-weight:700;font-size:15px;flex:1}
.req-time{font-size:11px;color:var(--gray)}
.req-song{font-size:14px;color:var(--gray2);margin-bottom:4px}
.req-msg{font-size:13px;color:var(--gray2);font-style:italic;padding:6px 10px;background:var(--bg2);border-radius:6px;margin:8px 0}
.req-actions{display:flex;gap:8px;margin-top:10px}
.req-btn{flex:1;padding:8px;border-radius:8px;font-family:'Barlow',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.5px}
.req-played{background:rgba(39,174,96,0.15);color:#27ae60;border:1px solid rgba(39,174,96,0.3)}
.req-played:hover{background:rgba(39,174,96,0.25)}
.req-dismiss{background:var(--bg2);color:var(--gray);border:1px solid var(--border)}
.req-dismiss:hover{color:var(--white)}
.live-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.3);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;color:var(--red2);margin-bottom:16px}
.live-dot{width:8px;height:8px;background:var(--red);border-radius:50%;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* ADMIN ITEMS */
.admin-pl-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.admin-pl-name{flex:1;font-weight:700;font-size:15px}
.admin-pl-count{font-size:12px;color:var(--gray2);margin-top:2px}
.toggle{width:44px;height:24px;background:var(--bg2);border:2px solid var(--border);border-radius:12px;position:relative;cursor:pointer;transition:all 0.2s;flex-shrink:0}
.toggle::after{content:'';position:absolute;width:16px;height:16px;background:var(--gray);border-radius:50%;top:2px;left:2px;transition:all 0.2s}
.toggle.on{background:rgba(192,57,43,0.2);border-color:var(--red)}
.toggle.on::after{background:var(--red);transform:translateX(20px)}
.manage-btn{background:none;border:1px solid var(--border);color:var(--gray2);padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif}
.manage-btn:hover{border-color:var(--red2);color:var(--red2)}
.admin-song-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.admin-song-info{flex:1}
.admin-song-title{font-weight:600;font-size:14px}
.admin-song-artist{font-size:12px;color:var(--gray2);margin-top:2px}
.admin-song-item.hidden-song{opacity:0.45}

/* ADD FORM */
.add-form{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.add-form h4{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gray2);margin-bottom:12px}
.add-form .field{margin-bottom:10px}
.add-form .field input{font-size:14px;padding:10px 12px}
.artist-row{display:flex;gap:6px;align-items:flex-start}
.artist-row .field{flex:1}
.btn-plus{width:36px;height:36px;background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.3);border-radius:8px;color:var(--red2);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:0;transition:all 0.2s}
.btn-plus:hover{background:rgba(192,57,43,0.25)}
.btn-add{width:100%;background:var(--red);color:white;border:none;border-radius:8px;padding:12px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
.btn-add:hover{background:var(--red2)}

/* BULK IMPORT */
.bulk-section{background:var(--bg3);border:1px solid rgba(192,57,43,0.3);border-radius:12px;padding:16px;margin-bottom:16px}
.bulk-section h4{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--red2);margin-bottom:6px}
.bulk-section p{font-size:12px;color:var(--gray2);margin-bottom:10px;line-height:1.5}
.bulk-section textarea{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--white);font-family:monospace;font-size:13px;outline:none;resize:vertical;min-height:100px}
.bulk-section textarea:focus{border-color:var(--red)}

/* WISHLIST */
.wish-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.wish-count{background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.3);color:var(--red2);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.emoji-rx{font-size:16px;margin-right:8px}

/* PILLS */
.pl-pills{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;margin-bottom:16px}
.pl-pills::-webkit-scrollbar{height:0}
.pl-pill{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:6px 14px;color:var(--gray2);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.2s;font-family:'Barlow',sans-serif}
.pl-pill.active{background:rgba(192,57,43,0.15);border-color:var(--red);color:var(--red2)}

/* CONFIG */
.cfg-section{margin-bottom:24px}
.cfg-section h4{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gray);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.cfg-field{margin-bottom:12px}
.cfg-field label{display:block;font-size:13px;font-weight:600;color:var(--gray2);margin-bottom:6px}
.cfg-field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--white);font-family:'Barlow',sans-serif;font-size:14px;outline:none}
.cfg-field input:focus{border-color:var(--red)}
.safe-row{display:flex;align-items:center;gap:12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:12px}
.safe-info{flex:1}
.safe-title{font-weight:600;font-size:15px}
.safe-sub{font-size:12px;color:var(--gray2);margin-top:2px}
.save-cfg-btn{width:100%;background:var(--red);color:white;border:none;border-radius:10px;padding:14px;font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px;cursor:pointer;transition:all 0.2s;margin-top:8px}
.save-cfg-btn:hover{background:var(--red2)}

/* QR */
.qr-section{text-align:center;padding:20px 0}
#qr-container{display:inline-block;padding:16px;background:white;border-radius:12px;margin:16px auto}

/* EMPTY / LOADING */
.empty-state{text-align:center;padding:60px 20px;color:var(--gray)}
.empty-icon{font-size:48px;margin-bottom:12px}
.loading{display:flex;align-items:center;justify-content:center;min-height:200px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* NOTIF POPUP */
.notif-popup{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--red);border-radius:12px;padding:12px 16px;z-index:9998;display:flex;align-items:center;gap:10px;max-width:340px;width:calc(100% - 32px);box-shadow:0 4px 24px rgba(192,57,43,0.3);animation:slideDown 0.3s ease}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.notif-icon{font-size:24px;flex-shrink:0}
.notif-text{flex:1}
.notif-title{font-weight:700;font-size:14px;color:var(--red2)}
.notif-sub{font-size:12px;color:var(--gray2);margin-top:2px}
.req-reactions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.reaction-btn{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--gray2);padding:5px 10px;border-radius:20px;font-size:12px;cursor:pointer;font-family:'Barlow',sans-serif;font-weight:600;transition:all 0.2s;white-space:nowrap}
.reaction-btn:hover{background:rgba(192,57,43,0.2);border-color:var(--red);color:var(--red2)}
.reaction-btn.sent{background:rgba(192,57,43,0.25);border-color:var(--red2);color:var(--red2)}
/* Reação recebida pelo cliente */
.admin-reaction-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);background:var(--bg2);border:2px solid var(--red);border-radius:20px;padding:28px 32px;z-index:9999;text-align:center;animation:reactionPop 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;max-width:300px;width:90%}
@keyframes reactionPop{from{opacity:0;transform:translate(-50%,-50%) scale(0.6)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.admin-reaction-emoji{font-size:52px;margin-bottom:12px}
.admin-reaction-from{font-size:12px;color:var(--gray);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.admin-reaction-text{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:2px;color:var(--red2)}
.reaction-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9998}

/* ── SHOWS ── */
.shows-banner{margin:0 20px 14px;background:linear-gradient(135deg,#1a0000,#2a0808);border:1px solid rgba(192,57,43,.35);border-radius:var(--radius);padding:16px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:border-color .2s}
.shows-banner:active{border-color:var(--red)}
.shows-banner-icon{font-size:30px;flex-shrink:0}
.shows-banner-info{flex:1}
.shows-banner-title{font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px;margin-bottom:2px}
.shows-banner-sub{font-size:12px;color:var(--gray2)}
.shows-grid{padding:14px 20px}
.show-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.show-header-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.show-date-badge{background:var(--red);border-radius:8px;padding:6px 10px;text-align:center;flex-shrink:0;min-width:46px}
.show-date-day{font-family:'Bebas Neue',cursive;font-size:26px;line-height:1;color:#fff}
.show-date-mon{font-size:10px;font-weight:700;color:rgba(255,255,255,.8);text-transform:uppercase;letter-spacing:1px}
.show-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;text-transform:uppercase;letter-spacing:.5px;flex:1;line-height:1.2}
.show-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.show-meta-pill{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--gray2);font-weight:600}
.show-maps-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;background:var(--red);border:none;border-radius:8px;padding:11px;font-family:'Bebas Neue',cursive;font-size:14px;letter-spacing:1px;color:#fff;cursor:pointer;text-decoration:none}
.shows-empty{text-align:center;padding:60px 20px}
.shows-empty-icon{font-size:46px;margin-bottom:12px}
.shows-empty-title{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:2px;margin-bottom:8px}
.shows-empty-sub{font-size:14px;color:var(--gray2);line-height:1.6}
.shows-loading,.shows-error{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:180px;gap:16px;text-align:center;padding:20px;font-size:14px;color:var(--gray2)}
/* ── ADMIN BULK + SONGS ── */
.artist-group-hdr{background:var(--bg3);border-bottom:1px solid var(--border);padding:8px 16px;font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--gray2);display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:10}
.artist-group-hdr span{color:var(--white)}
.admin-song-cb{width:22px;height:22px;border-radius:6px;border:2px solid var(--gray);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;cursor:pointer}
.admin-song-item.bulk-sel{background:rgba(192,57,43,.12)}
.admin-song-item.bulk-sel .admin-song-cb{background:var(--red);border-color:var(--red);color:#fff}
.song-pl-tag{font-size:10px;color:var(--gray);background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;white-space:nowrap;flex-shrink:0}
.admin-bulk-bar{position:fixed;bottom:70px;left:0;right:0;max-width:480px;margin:0 auto;background:var(--bg2);border-top:2px solid var(--red);border-bottom:1px solid var(--border);padding:10px 16px;z-index:400}
.admin-bulk-cnt{font-size:13px;font-weight:700;margin-bottom:8px}.admin-bulk-cnt em{color:var(--red2);font-style:normal}
.admin-bulk-actions{display:flex;gap:6px;flex-wrap:wrap}
.admin-bulk-btn{flex:1;min-width:70px;padding:8px 6px;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--white);font-family:'Barlow',sans-serif;font-size:12px;font-weight:700;cursor:pointer;text-align:center}
.admin-bulk-btn.danger{border-color:rgba(192,57,43,.4);color:var(--red2)}
.admin-bulk-move-pls{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.admin-bulk-pl-btn{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.3);color:var(--red2);padding:6px 12px;border-radius:8px;font-family:'Barlow',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
/* ── CUSTOM REACTION INPUT ── */
.custom-rx-row{display:flex;gap:6px;margin-top:8px}
.custom-rx-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--white);font-size:13px;font-family:'Barlow',sans-serif;outline:none}
.custom-rx-input::placeholder{color:var(--gray)}
</style>

// ═══ WAKE LOCK + ÁUDIO SILENCIOSO (mantém ativo com tela em standby) ═══
let _wakeLock=null;
let _silentAudio=null;

// Impede bloqueio automático por timeout
async function acquireWakeLock(){
  try{
    if('wakeLock' in navigator){
      _wakeLock=await navigator.wakeLock.request('screen');
      _wakeLock.addEventListener('release',()=>{_wakeLock=null;});
    }
  }catch(e){}
}

// Áudio silencioso em loop — mantém o Chrome vivo mesmo com tela bloqueada manualmente
// (mesmo truque que apps de música usam para rodar em background)
function startSilentAudio(){
  if(_silentAudio) return;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const buf=ctx.createBuffer(1,ctx.sampleRate,ctx.sampleRate); // 1s de silêncio
    const src=ctx.createBufferSource();
    src.buffer=buf;
    src.loop=true;
    src.connect(ctx.destination);
    src.start(0);
    _silentAudio=src;
  }catch(e){}
}

// Ativa tudo quando o admin entra no painel
function activateAdminKeepAlive(){
  acquireWakeLock();
  startSilentAudio();
}

});

function playNotifSound(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const osc=ctx.createOscillator();const gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.frequency.setValueAtTime(880,ctx.currentTime);osc.frequency.exponentialRampToValueAtTime(440,ctx.currentTime+0.1);gain.gain.setValueAtTime(0.3,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.4);}catch(e){}}

async function loadConfig(){try{const d=await db.collection('config').doc('main').get();if(d.exists){S.config={...S.config,...d.data()};if(!S.config.gcalKey)S.config.gcalKey='';if(!S.config.gcalId)S.config.gcalId='';}else await db.collection('config').doc('main').set(S.config);}catch(e){}}
async function loadPlaylists(){
  try{
    const snap=await db.collection('playlists').orderBy('order').get();
    S.playlists=snap.docs.map(d=>({id:d.id,...d.data()}));
    S.allSongs=[];
    for(const pl of S.playlists){const ss=await db.collection('playlists').doc(pl.id).collection('songs').orderBy('title').get();const songs=ss.docs.map(d=>({id:d.id,...d.data(),playlistId:pl.id,playlistName:pl.name}));S.songs[pl.id]=songs;S.allSongs.push(...songs);}

  }catch(e){}
}
function listenReqs(){
  if(S.reqListener)S.reqListener();
  S.reqListener=db.collection('requests')
    .where('status','==','pending')
    .orderBy('createdAt','desc')
    .onSnapshot(snap=>{
      const newReqs=snap.docs.map(d=>({id:d.id,...d.data()}));
      if(S.isAdmin&&newReqs.length>S._prevReqCount&&S._prevReqCount>=0){
        const newest=newReqs[0];if(newest)showNotif(newest);
      }
      S._prevReqCount=newReqs.length;
      S.requests=newReqs;
      if(S.isAdmin&&S.adminTab==='requests')renderAdmin();
    },err=>{
      // Se listener falhar, reconecta em 3s
      console.warn('Listener desconectado, reconectando...',err);
      S.reqListener=null;
      setTimeout(()=>{if(S.isAdmin)listenReqs();},3000);
    });
}
function listenWish(){
  if(S.wishListener)S.wishListener();
  S.wishListener=db.collection('wishlist').orderBy('count','desc').onSnapshot(snap=>{S.wishlist=snap.docs.map(d=>({id:d.id,...d.data()}));if(S.isAdmin&&S.adminTab==='wishlist')renderAdmin();});
}

// ═══ SERVICE WORKER (notificações reais no Android) ═══
// Requer sw.js na raiz do servidor (mesmo nível do index.html)
let _swReg=null;
async function initSW(){
  if(!('serviceWorker' in navigator))return;
  try{
    // Registra o sw.js real — funciona no PWA instalado
    _swReg=await navigator.serviceWorker.register('./sw.js',{scope:'./'});
    // Aguarda SW ficar ativo
    if(_swReg.installing){
      await new Promise(resolve=>{
        _swReg.installing.addEventListener('statechange',e=>{if(e.target.state==='activated')resolve();});
      });
    }
    // Pega o controller mais atualizado
    _swReg=await navigator.serviceWorker.ready;
  }catch(e){console.warn('SW não disponível:',e);}
}

// ═══ NOTIF ═══
// Detecta se está rodando dentro do APK Android
const _isAndroidApp = /wv/.test(navigator.userAgent) && /Android/.test(navigator.userAgent);

function showNotif(req){
  playNotifSound();
  // Popup vermelho só no browser/PWA — APK Android já tem notificação nativa
  if(!_isAndroidApp){
    const old=document.querySelector('.notif-popup');if(old)old.remove();
    const div=document.createElement('div');div.className='notif-popup';
    div.innerHTML='<div class="notif-icon">🎵</div><div class="notif-text"><div class="notif-title">'+req.requesterName+' pediu uma música!</div><div class="notif-sub">'+req.songTitle+' — '+req.songArtist+(req.hasPix?' 💰 Pix R$'+(req.pixAmount||'?'):'')+'</div></div>';
    document.body.appendChild(div);
    setTimeout(()=>{div.style.opacity='0';div.style.transition='opacity 0.3s';setTimeout(()=>div.remove(),300);},5000);
    if(Notification.permission==='granted'){
      const title='🎵 Novo pedido!';
      const body=req.requesterName+' pediu: '+req.songTitle+' — '+req.songArtist;
      const sw=_swReg?.active||navigator.serviceWorker.controller;
      if(sw){sw.postMessage({type:'SHOW_NOTIF',title,body,url:location.href});}
      else{try{new Notification(title,{body,tag:'pedido-novo',requireInteraction:true});}catch(e){}}
    }
  }
  // No APK — notificação vem do Java, lista já atualiza pelo listener
}
async function requestNotifPerm(){
  if(!('Notification' in window))return;
  if(Notification.permission==='default'){const p=await Notification.requestPermission();S._notifPerm=p==='granted';}
  else if(Notification.permission==='granted'){S._notifPerm=true;}
  if(Notification.permission==='granted')initSW();
}

// ═══ PIX BR CODE GENERATOR ═══
function buildPixPayload(pixKey,amount,merchantName,merchantCity){
  function crc16(str){
    let crc=0xFFFF;
    for(let i=0;i<str.length;i++){crc^=str.charCodeAt(i)<<8;for(let j=0;j<8;j++){crc=(crc&0x8000)?(crc<<1)^0x1021:crc<<1;}}
    return(crc&0xFFFF).toString(16).toUpperCase().padStart(4,'0');
  }
  function tlv(id,value){return id+String(value.length).padStart(2,'0')+value;}
  const name=(merchantName||'Sujeito Rock').substring(0,25).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Za-z0-9 ]/g,'');
  const city=(merchantCity||'SAO PAULO').substring(0,15).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Za-z0-9 ]/g,'');
  const mai=tlv('00','br.gov.bcb.pix')+tlv('01',pixKey);
  const adf=tlv('05','***');
  let body=tlv('00','01')+tlv('26',mai)+tlv('52','0000')+tlv('53','986');
  if(amount>0)body+=tlv('54',amount.toFixed(2));
  body+=tlv('58','BR')+tlv('59',name)+tlv('60',city)+tlv('62',adf);
  body+=tlv('63',crc16(body+'6304'));
  return body;
}

function renderPixQR(){
  const container=document.getElementById('pix-qr-container');
  if(!container)return;
  container.innerHTML='';
  if(!S.config.pixKey){return;}
  const payload=buildPixPayload(S.config.pixKey,0,S.config.pixOwnerName||'SUJEITO ROCK',S.config.pixCity||'SAO PAULO');
  const url='https://api.qrserver.com/v1/create-qr-code/?size=180x180&margin=10&data='+encodeURIComponent(payload);
  const img=document.createElement('img');
  img.alt='QR Code Pix';img.style.cssText='width:180px;height:180px;border-radius:8px;display:block';
  img.onload=()=>{
    container.style.background='#fff';container.style.padding='12px';container.style.borderRadius='10px';container.style.display='inline-block';
    container.innerHTML='';container.appendChild(img);
  };
  img.onerror=()=>{container.innerHTML='';};
  img.src=url;
}

function goBack(){const m={step1:S.currentPlaylist?'playlist':'home',step2:'step1',suggest:S.currentPlaylist?'playlist':'home',shows:'home'};goTo(m[S.screen]||'home');}

// ═══ POPSTATE — botão voltar do browser/celular ═══
window.addEventListener('popstate',function(e){
  const backMap={step2:'step1',step1:S.currentPlaylist?'playlist':'home',playlist:'home',suggest:S.currentPlaylist?'playlist':'home',confirm:'home','admin-login':'home',admin:'home'};
  const prev=backMap[S.screen]||'home';
  if(prev==='home'){S.screen='home';S.searchQuery='';S.searchResults=[];S.currentPlaylist=null;S.currentSong=null;}
  else{S.screen=prev;}
  render();window.scrollTo(0,0);
});

// ═══ SEARCH ═══
let _searchTimer=null;
function doSearch(q){
  S.searchQuery=q;
  if(!q.trim()){S.searchResults=[];render();return;}
  clearTimeout(_searchTimer);
  _searchTimer=setTimeout(()=>{
    const lq=q.toLowerCase();
    S.searchResults=S.allSongs.filter(s=>s.visible!==false&&(s.title?.toLowerCase().includes(lq)||s.artist?.toLowerCase().includes(lq)));
    render();
  },500);
}

// ═══ AUTOCOMPLETE ═══
function getArtists(){return [...new Set(S.allSongs.map(s=>s.artist).filter(Boolean))].sort();}
function getSongs(){return [...new Set(S.allSongs.map(s=>s.title).filter(Boolean))].sort();}
function showAutocomplete(inputId,items,onSelect){
  const inp=document.getElementById(inputId);if(!inp)return;
  const val=inp.value.toLowerCase();
  document.querySelectorAll('.autocomplete-list').forEach(e=>e.remove());
  if(!val){return;}
  const matches=items.filter(i=>i.toLowerCase().includes(val)).slice(0,5);
  if(!matches.length)return;
  const list=document.createElement('div');list.className='autocomplete-list';
  matches.forEach(m=>{const d=document.createElement('div');d.className='autocomplete-item';d.textContent=m;d.onclick=()=>{inp.value=m;onSelect&&onSelect(m);document.querySelectorAll('.autocomplete-list').forEach(e=>e.remove());};list.appendChild(d);});
  inp.parentNode.appendChild(list);
}

// ═══ RENDER ═══
function render(){
  const root=document.getElementById('root');
  switch(S.screen){
    case 'home':root.innerHTML=renderHome();break;
    case 'playlist':root.innerHTML=renderPlaylist();break;
    case 'step1':root.innerHTML=renderStep1();break;
    case 'step2':root.innerHTML=renderStep2();break;
    case 'confirm':root.innerHTML=renderConfirm();break;
    case 'suggest':root.innerHTML=renderSuggest();break;
    case 'shows':root.innerHTML=renderShows();break;
    case 'admin-login':root.innerHTML=renderAdminLogin();break;
    default:if(S.isAdmin)renderAdmin();else root.innerHTML=renderHome();
  }
  attachEvents();
}

function renderPlaylist(){
  const pl=S.currentPlaylist;if(!pl)return'';
  const songs=(S.songs[pl.id]||[]).filter(s=>s.visible!==false);
  const q=S._plSearch||'';
  const filtered=q?songs.filter(s=>s.title?.toLowerCase().includes(q)||s.artist?.toLowerCase().includes(q)):songs;
  const selMode=S.selectionMode;
  const selIds=new Set(S.selectedSongs.map(x=>x.id));
  function songRow(s,i){
    const sel=selIds.has(s.id);
    if(selMode){
      return`<div class="song-item ${sel?'song-selected':''}" onclick="toggleSongSel('${s.playlistId}','${s.id}')">
        <div class="song-check">${sel?'✓':''}</div>
        <div class="song-info"><div class="song-title">${s.title}</div><div class="song-artist">${s.artist}</div></div>

    return`<div class="song-item" onclick="selectSong('${s.playlistId}','${s.id}')"><div class="song-num">${i+1}</div><div class="song-info"><div class="song-title">${s.title}</div><div class="song-artist">${s.artist}</div></div><span class="song-arrow">›</span></div>`;

    <div class="screen-header"><button class="back-btn" onclick="goHome()">←</button><div class="screen-header-info"><div class="screen-header-title">${pl.emoji||'🎵'} ${pl.name}</div><div class="screen-header-sub">${songs.length} músicas no repertório</div></div><button class="select-toggle ${selMode?'active':''}" onclick="toggleSelMode()">${selMode?'Cancelar':'Selecionar'}</button></div>

      ${filtered.length===0?'<div class="empty-state"><p>Nenhuma música encontrada.</p></div>':''}
      ${filtered.map((s,i)=>songRow(s,i)).join('')}
    </div>
    ${!selMode?`<button class="suggest-btn" onclick="goTo('suggest',{currentPlaylist:S.currentPlaylist})">➕ Não achou a sua? Sugira uma música</button>`:''}

  </div>`;
}

function filterPl(q){
  S._plSearch=q.toLowerCase();
  const sl=document.querySelector('.songs-list');if(!sl)return;
  const pl=S.currentPlaylist;
  const songs=(S.songs[pl.id]||[]).filter(s=>s.visible!==false);
  const filtered=q?songs.filter(s=>s.title?.toLowerCase().includes(q)||s.artist?.toLowerCase().includes(q)):songs;
  const selMode=S.selectionMode;
  const selIds=new Set(S.selectedSongs.map(x=>x.id));
  sl.innerHTML=(filtered.length===0?'<div class="empty-state"><p>Nenhuma música encontrada.</p></div>':'')+filtered.map((s,i)=>{
    const sel=selIds.has(s.id);
    if(selMode)return`<div class="song-item ${sel?'song-selected':''}" onclick="toggleSongSel('${s.playlistId}','${s.id}')"><div class="song-check">${sel?'✓':''}</div><div class="song-info"><div class="song-title">${s.title}</div><div class="song-artist">${s.artist}</div></div></div>`;
    return`<div class="song-item" onclick="selectSong('${s.playlistId}','${s.id}')"><div class="song-num">${i+1}</div><div class="song-info"><div class="song-title">${s.title}</div><div class="song-artist">${s.artist}</div></div><span class="song-arrow">›</span></div>`;
  }).join('');
}

function detectWallets(){
  const ua=navigator.userAgent.toLowerCase();
  const btns=[];
  if(/iphone|ipad|ipod/.test(ua))btns.push({label:'Apple Pay',icon:'🍎',scheme:'shoebox://'});
  if(/samsung/.test(ua)||/samsungbrowser/.test(ua))btns.push({label:'Samsung Pay',icon:'💳',scheme:'samsungpay://'});
  btns.push({label:'Google Pay',icon:'🅖',scheme:'googlepay://'});
  return btns;
}
function showPix(){
  S.showPixKey=true;render();
  setTimeout(()=>{
    renderPixQR();
    const wb=document.getElementById('wallet-btns');if(!wb)return;
    const wallets=detectWallets();
    const pixKey=encodeURIComponent(S.config.pixKey);
    wb.innerHTML=wallets.map(w=>`<button class="wallet-btn" onclick="tryWallet('${w.scheme}','${pixKey}')">${w.icon} ${w.label}</button>`).join('');
  },80);
}
function tryWallet(scheme,key){
  const start=Date.now();window.location.href=scheme;
  setTimeout(()=>{if(Date.now()-start<2000)toast('App não encontrado. Use a chave Pix copiada!');},1500);
}

function copyPix(){
  navigator.clipboard.writeText(S.config.pixKey).then(()=>toast('Chave Pix copiada! 📋')).catch(()=>{const el=document.createElement('textarea');el.value=S.config.pixKey;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);toast('Chave Pix copiada! 📋');});
}
async function confirmPix(hasPix){
  S.hasPix=hasPix;
  const amt=hasPix?(S.pixAmount===-1?parseInt(S.pixCustom)||0:S.pixAmount):0;
  const songs=S.selectedSongs.length>1?S.selectedSongs:[S.currentSong];
  try{
    const ids=[];
    for(const song of songs){
      const ref=await db.collection('requests').add({songTitle:song.title,songArtist:song.artist,playlistId:song.playlistId,requesterName:S.requesterName.trim()||'Anônimo',message:S.message.trim(),hasPix,pixAmount:amt,status:'pending',adminReaction:null,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
      ids.push(ref.id);
    }
    S.lastReqIds=ids;S.adminReaction=null;
    goTo('confirm');
    startReactionListener();
  }catch(e){toast('Erro ao enviar. Tente novamente.');}
}

async function submitSuggest(){
  const title=document.getElementById('sg-title')?.value.trim();
  const artist=document.getElementById('sg-artist')?.value.trim();
  const name=document.getElementById('sg-name')?.value.trim();
  if(!title||!artist){toast('Preenche o nome da música e o artista!');return;}
  try{const ex=S.wishlist.find(w=>w.title.toLowerCase()===title.toLowerCase()&&w.artist.toLowerCase()===artist.toLowerCase());
  if(ex)await db.collection('wishlist').doc(ex.id).update({count:firebase.firestore.FieldValue.increment(1),updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
  else await db.collection('wishlist').add({title,artist,count:1,requestedBy:name||'Anônimo',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
  toast('Sugestão enviada! 🎸');setTimeout(()=>goHome(),1200);}catch(e){toast('Erro ao enviar.');}
}

function cycleArtist(){const artists=getArtists();if(!artists.length){toast('Nenhum artista cadastrado ainda.');return;}const inp=document.getElementById('new-s-artist');if(!inp)return;const cur=inp.value;const idx=artists.indexOf(cur);inp.value=artists[(idx+1)%artists.length];}

async function importBulk(){
  const text=document.getElementById('bulk-input')?.value.trim();
  if(!text){toast('Cole as músicas no campo acima!');return;}
  if(!S.adminSongsPl){toast('Selecione uma playlist!');return;}
  // normaliza traço e travessão em separador único
  const normLines=text.split('\n').map(l=>l.trim().replace(/\s*[–—]\s*/g,' - ')).filter(l=>l&&l.includes(' - '));
  if(!normLines.length){toast('Formato incorreto! Use: Artista - Música');return;}
  toast('Importando '+normLines.length+' músicas...');
  let ok=0;
  for(const line of normLines){
    const sep=line.indexOf(' - ');if(sep===-1)continue;
    const artist=line.substring(0,sep).trim();
    const title=line.substring(sep+3).trim();
    if(!artist||!title)continue;
    try{
      const ref=await db.collection('playlists').doc(S.adminSongsPl).collection('songs').add({title,artist,visible:true,addedAt:firebase.firestore.FieldValue.serverTimestamp()});
      const ns={id:ref.id,title,artist,visible:true,playlistId:S.adminSongsPl,playlistName:S.playlists.find(p=>p.id===S.adminSongsPl)?.name};
      if(!S.songs[S.adminSongsPl])S.songs[S.adminSongsPl]=[];S.songs[S.adminSongsPl].push(ns);S.allSongs.push(ns);ok++;
    }catch(e){}
  }
  toast(ok+' músicas importadas! 🎤');setTimeout(()=>renderAdmin(),500);
}

function _esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';} 
async function loadShows(){
  const key=S.config.gcalKey||'';
  const calId=S.config.gcalId||'';
  if(!key||!calId){
    S.showsLoaded=true;
    S.showsError='Configure a Google Calendar API Key e o ID da agenda nas configurações do Admin.';
    if(S.screen==='shows')render();
    return;
  }
  try{
    const now=new Date().toISOString();
    const url=`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events?key=${encodeURIComponent(key)}&timeMin=${encodeURIComponent(now)}&orderBy=startTime&singleEvents=true&maxResults=20`;
    const res=await fetch(url);
    if(!res.ok)throw new Error('API error '+res.status);
    const data=await res.json();
    S.showsData=data.items||[];S.showsLoaded=true;S.showsError=null;
  }catch(e){S.showsLoaded=true;S.showsError='Não foi possível carregar a agenda. Tente novamente.';}
  if(S.screen==='shows')render();
}
function fmtShowDate(ev){
  const start=ev.start?.dateTime||ev.start?.date;if(!start)return{day:'?',mon:'?',time:null,weekday:''};
  const d=new Date(start);const allDay=!ev.start?.dateTime;const TZ='America/Sao_Paulo';
  const day=parseInt(d.toLocaleString('pt-BR',{day:'numeric',timeZone:TZ}),10);
  const mon=d.toLocaleString('pt-BR',{month:'short',timeZone:TZ}).replace('.','').toUpperCase();
  const weekday=d.toLocaleString('pt-BR',{weekday:'long',timeZone:TZ});
  const time=allDay?null:d.toLocaleString('pt-BR',{hour:'2-digit',minute:'2-digit',timeZone:TZ});
  return{day,mon,time,weekday};
}
function renderShows(){
  if(!S.showsLoaded){
    if(!S._showsFetching){S._showsFetching=true;loadShows();}
    return`<div class="screen fade-in">

    </div>`;
  }
  const events=S.showsData||[];
  return`<div class="screen fade-in">
    <div class="screen-header">
      <button class="back-btn" onclick="goHome()">←</button>
      <div class="screen-header-info">
        <div class="screen-header-title">📅 Próximos Shows</div>

    </div>
    ${events.length===0?`
      <div class="shows-empty">
        <div class="shows-empty-icon">🎸</div>
        <div class="shows-empty-title">Nenhum show agendado</div>
        <div class="shows-empty-sub">Os próximos shows aparecem aqui quando forem confirmados.<br>Siga @sujeitorock nas redes!</div>
      </div>`:`
    <div class="shows-grid">${events.map(ev=>{
      const{day,mon,time,weekday}=fmtShowDate(ev);
      const venue=ev.location?.trim()||'A confirmar';
      const desc=(ev.description||'').replace(/<[^>]+>/g,'').trim();
      const mapsUrl=venue&&venue!=='A confirmar'?'https://maps.google.com/?q='+encodeURIComponent(venue):null;
      return`<div class="show-card">
        <div class="show-header-row">
          <div class="show-date-badge"><div class="show-date-day">${day}</div><div class="show-date-mon">${mon}</div></div>

        </div>

          ${time?`<span class="show-meta-pill">🕐 ${time}h</span>`:''}
         ${venue&&venue!=='A confirmar'?`<span class="show-meta-pill">📍 ${_esc(venue)}</span>`:''}
          ${weekday?`<span class="show-meta-pill">${weekday.charAt(0).toUpperCase()+weekday.slice(1)}</span>`:''}
        </div>
        ${desc.length>0?`<div style="font-size:12px;color:var(--gray2);margin-bottom:12px;line-height:1.5">${_esc(desc.length>120?desc.slice(0,120)+'…':desc)}</div>`:''}

      </div>`;
    }).join('')}</div>`}
  </div>`;
}

      await db.collection('playlists').doc(toPlId).collection('songs').doc(song.id).set({title:song.title,artist:song.artist,visible:song.visible!==false,addedAt:firebase.firestore.FieldValue.serverTimestamp()});
      await db.collection('playlists').doc(song.playlistId).collection('songs').doc(song.id).delete();
      S.songs[song.playlistId]=(S.songs[song.playlistId]||[]).filter(x=>x.id!==song.id);
      const ns={...song,playlistId:toPlId,playlistName:toPl?.name||''};
      if(!S.songs[toPlId])S.songs[toPlId]=[];S.songs[toPlId].push(ns);
      const ai=S.allSongs.findIndex(x=>x.id===song.id&&x.playlistId===song.playlistId);
      if(ai>=0)S.allSongs[ai]={...S.allSongs[ai],playlistId:toPlId,playlistName:toPl?.name||''};
      ok++;
    }catch(e){}
  }
  S.adminBulkSel=[];S.adminBulkMoving=false;toast(ok+' músicas movidas para '+toPl?.name+'! ✅');renderAdmin();
}
async function bulkToggleVisible(){
  if(!S.adminBulkSel.length)return;
  const val=S.adminBulkSel[0]?.visible===false;
  toast((val?'Mostrando ':'Ocultando ')+S.adminBulkSel.length+' músicas...');
  for(const s of S.adminBulkSel){
    try{await db.collection('playlists').doc(s.playlistId).collection('songs').doc(s.id).update({visible:val});
    const ls=(S.songs[s.playlistId]||[]).find(x=>x.id===s.id);if(ls)ls.visible=val;
    const la=S.allSongs.find(x=>x.id===s.id&&x.playlistId===s.playlistId);if(la)la.visible=val;}catch(e){}
  }
  S.adminBulkSel=[];toast('Pronto! ✅');renderAdmin();
}
// ─── CUSTOM REACTION ───
function sendCustomReaction(id,val){
  const msg=typeof val==='string'?val.trim():(val?.value||'').trim();
  if(!msg){toast('Escreva algo primeiro!');return;}
  sendReaction(id,msg);
  try{const el=document.getElementById('crx-'+id);if(el)el.value='';}catch(e){}
}
// ═══ BOOT ═══
  
auth.onAuthStateChanged(user=>{
  if(user){
    // Só ativa admin se: estava logado antes (localStorage), ou veio via #admin, ou está na tela de login admin
    const eraAdmin=localStorage.getItem('sr_was_admin')==='1';
    const vaiParaAdmin=S.screen==='admin-login'||window.location.hash==='#admin';
    if(eraAdmin||vaiParaAdmin){
      localStorage.setItem('sr_was_admin','1');
      S.isAdmin=true;S.adminTab='requests';S._prevReqCount=-1;
      listenReqs();listenWish();requestNotifPerm();activateAdminKeepAlive();
      renderAdmin();
    }
    // Se não está indo para admin — usuário está na área pública, não ativa nada
  }
});
async function init(){history.replaceState({screen:'home'},'home','');await loadConfig();render();loadPlaylists();if(window.location.hash==='#admin')goTo('admin-login');}
// Keepalive: ping leve a cada 25s para manter Firebase vivo em standby
setInterval(()=>{if(S.isAdmin){try{db.collection('_keep').doc('alive').set({t:Date.now()}).catch(()=>{});}catch(e){}}},25000);
init();
</script>
