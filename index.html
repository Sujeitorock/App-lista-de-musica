<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SujeitoRock</title>

<style>
body{margin:0;font-family:Arial;background:#0a0a0a;color:white}
#root{max-width:480px;margin:auto}

.playlists-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:20px;
}

.playlist-card{
  background:#1e1e1e;
  padding:20px;
  border-radius:10px;
  cursor:pointer;
  text-align:center;
}

.song-item{
  padding:12px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

.screen-header{
  padding:15px;
  border-bottom:1px solid #333;
  display:flex;
  gap:10px;
}

.back-btn{
  cursor:pointer;
}
</style>
</head>

<body>
<div id="root"></div>

<script>
// ===== BASE DE DADOS (mock) =====
const playlists = {
  "recentes": [
    {title:"Numb", artist:"Linkin Park"},
    {title:"Use Somebody", artist:"Kings of Leon"}
  ],
  "anos90": [
    {title:"Wonderwall", artist:"Oasis"},
    {title:"Smells Like Teen Spirit", artist:"Nirvana"}
  ],
  "anos80": [
    {title:"Billie Jean", artist:"Michael Jackson"}
  ]
}

// ===== HOME =====
function renderHome(){
  const root = document.getElementById('root')

  root.innerHTML = `
    <div class="playlists-grid">
      <div class="playlist-card" onclick="openPlaylist('recentes')">
        Recentes
      </div>

      <div class="playlist-card" onclick="openPlaylist('anos90')">
        Anos 90
      </div>

      <div class="playlist-card" onclick="openPlaylist('anos80')">
        Anos 80
      </div>
    </div>
  `
}

// ===== ABRIR PLAYLIST =====
function openPlaylist(nome){
  const root = document.getElementById('root')
  const lista = playlists[nome]

  root.innerHTML = `
    <div class="screen-header">
      <div class="back-btn" onclick="renderHome()">←</div>
      <div>${nome}</div>
    </div>

    <div>
      ${lista.map((m,i)=>`
        <div class="song-item" onclick="selectSong('${m.title}','${m.artist}')">
          ${i+1}. ${m.title} - ${m.artist}
        </div>
      `).join('')}
    </div>
  `
}

// ===== SELECIONAR MÚSICA =====
function selectSong(title,artist){
  alert("Selecionado: " + title + " - " + artist)
}

// START
renderHome()
</script>

</body>
</html>
