<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SujeitoRock</title>

<style>
body{margin:0;background:#0a0a0a;color:#fff;font-family:Arial}
#root{max-width:480px;margin:auto}

.header{padding:20px;text-align:center;background:#1a0000}
.logo{font-size:28px;font-weight:bold}
.sub{font-size:12px;color:#999}

.search{padding:10px 20px}
.search input{
  width:100%;
  padding:12px;
  border-radius:20px;
  border:none;
  background:#1e1e1e;
  color:#fff
}

.section{padding:10px 20px;font-size:14px;color:#888}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:0 20px 20px
}

.card{
  background:#1e1e1e;
  padding:20px;
  border-radius:12px;
  cursor:pointer
}

.card.red{background:#2a0808}
</style>
</head>

<body>
<div id="root">

  <div class="header">
    <div class="logo">SujeitoRock</div>
    <div class="sub">Peça sua música 🎸</div>
  </div>

  <div class="search">
    <input placeholder="Buscar música ou artista...">
  </div>

  <div class="section">REPERTÓRIO</div>

  <div class="grid">

    <div class="card red playlist-card" data-playlist="recentes">
      ⚡ RECÉM ADICIONADAS
    </div>

    <div class="card playlist-card" data-playlist="anos90">
      🎵 ANOS 90 INTERNACIONAL
    </div>

    <div class="card playlist-card" data-playlist="anos80">
      🎵 80
    </div>

  </div>

</div>

<script>
// ===== DADOS MOCK =====
const playlists = {
  recentes:[
    {title:"Numb",artist:"Linkin Park"},
    {title:"Use Somebody",artist:"Kings of Leon"}
  ],
  anos90:[
    {title:"Wonderwall",artist:"Oasis"},
    {title:"Nirvana",artist:"Smells Like Teen Spirit"}
  ],
  anos80:[
    {title:"Billie Jean",artist:"Michael Jackson"}
  ]
}

// ===== CLIQUE PLAYLIST =====
function ativarPlaylists(){
  document.querySelectorAll('.playlist-card').forEach(card=>{
    card.onclick=()=>{
      const tipo=card.dataset.playlist
      abrirPlaylist(tipo)
    }
  })
}

// ===== ABRIR PLAYLIST =====
function abrirPlaylist(tipo){
  const lista=playlists[tipo]||[]

  const root=document.getElementById('root')

  root.innerHTML=`
    <div style="padding:20px">
      <button onclick="location.reload()">← voltar</button>
      <h2>${tipo}</h2>

      ${lista.map(m=>`
        <div style="padding:10px;border-bottom:1px solid #333">
          ${m.title} - ${m.artist}
        </div>
      `).join('')}
    </div>
  `
}

window.addEventListener('load',ativarPlaylists)
</script>

</body>
</html>
