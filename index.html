<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>SujeitoRock — Peça sua Música</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#000000;--bg2:#141414;--bg3:#1e1e1e;--red:#c0392b;--red2:#e74c3c;--white:#fff;--gray:#666;--gray2:#999;--border:rgba(255,255,255,0.08);--radius:12px}
html,body{background:var(--bg);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden}
#root{max-width:480px;margin:0 auto;min-height:100vh;position:relative}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--red);color:white;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
.screen{min-height:100vh;display:flex;flex-direction:column}
.fade-in{animation:fadeIn 0.25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* HOME */
.home-header{position:relative;padding:40px 20px 28px;text-align:center;background:#000000;}
.logo-img{width:240px;max-width:85%;position:relative;z-index:1;min-height:60px;color:var(--red2);font-family:'Bebas Neue';font-size:32px;letter-spacing:2px}
.search-bar{margin:0 20px 16px;position:relative}
.search-bar input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:30px;padding:12px 20px 12px 44px;color:var(--white);font-family:'Barlow',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s}
.search-bar input::placeholder{color:var(--gray)}
.search-bar input:focus{border-color:var(--red)}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--gray);font-size:18px}
.search-results{padding:0 20px 20px}
.search-result-item{display:flex;align-items:center;padding:14px 16px;background:var(--bg3);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:background 0.2s;border:1px solid var(--border)}
.search-result-info{flex:1}
.search-result-title{font-weight:600;font-size:15px}
.search-result-artist{color:var(--gray2);font-size:13px;margin-top:2px}
.section-title{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:2px;color:var(--gray2);padding:0 20px 12px;text-transform:uppercase}
.playlists-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 20px 20px}
.playlist-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:20px 16px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.playlist-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--red);transform:scaleX(0);transition:transform 0.2s}
.playlist-card.special{background:linear-gradient(135deg,#1a0000,#2a0808);border-color:rgba(192,57,43,0.3)}
.playlist-emoji{font-size:30px;display:block;margin-bottom:8px}
.playlist-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;text-transform:uppercase;letter-spacing:0.5px;line-height:1.2}
.playlist-count{font-size:12px;color:var(--gray2);margin-top:4px}
.home-footer{margin-top:auto;padding:24px 20px 36px;border-top:1px solid var(--border)}
/* SCREEN HEADER */
.screen-header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:none;color:var(--white);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.screen-header-info{flex:1}
.screen-header-title{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:1px}
/* PLAYLIST */
.playlist-search{padding:12px 20px}
.playlist-search input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 16px;color:var(--white);font-family:'Barlow',sans-serif;font-size:14px;outline:none}
.songs-list{padding:8px 20px}
.song-item{display:flex;align-items:center;padding:14px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer}
.song-num{width:28px;height:28px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--gray2);flex-shrink:0;margin-right:12px}
.song-info{flex:1}
.song-title{font-weight:600;font-size:15px}
.song-artist{color:var(--gray2);font-size:13px;margin-top:2px}
.suggest-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:calc(100% - 40px);margin:10px 20px 30px;padding:14px;background:transparent;border:1px dashed rgba(192,57,43,0.4);border-radius:10px;color:var(--red2);font-family:'Barlow',sans-serif;font-size:14px;font-weight:600;cursor:pointer}
/* STEPS */
.step-screen{padding:0 20px 30px}
.step-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.3);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;color:var(--red2);letter-spacing:1px;text-transform:uppercase;margin:24px 0 16px}
.step-song-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:24px;display:flex;align-items:center;gap:12px}
.step-song-icon{width:44px;height:44px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.step-song-title{font-weight:700;font-size:16px}
.step-song-artist{color:var(--gray2);font-size:13px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:700;color:var(--gray2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.field input,.field textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--white);font-family:'Barlow',sans-serif;font-size:15px;outline:none;resize:none}
.btn-primary{width:100%;background:var(--red);color:white;border:none;border-radius:10px;padding:16px;font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:2px;cursor:pointer;margin-top:8px}
.btn-secondary{width:100%;background:transparent;color:var(--gray2);border:1px solid var(--border);border-radius:10px;padding:14px;font-family:'Barlow',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
/* PIX */
.pix-amounts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.pix-amount-btn{background:var(--bg3);border:2px solid var(--border);border-radius:10px;padding:16px;color:var(--white);font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:1px;cursor:pointer;text-align:center}
.pix-amount-btn.selected{border-color:var(--red);background:rgba(192,57,43,0.15);color:var(--red2)}
.pix-label{display:block;font-family:'Barlow',sans-serif;font-size:11px;color:var(--gray2);font-weight:600;text-transform:uppercase;margin-top:2px}
.pix-key-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px;margin:16px 0;display:none}
.pix-key-box.show{display:block}
.pix-key-label{font-size:12px;color:var(--gray2);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px}
.pix-key-value{font-size:15px;font-weight:600;word-break:break-all;margin-bottom:10px}
.copy-btn{background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.3);border-radius:8px;padding:8px 16px;color:var(--red2);font-family:'Barlow',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.outro-row{display:flex;gap:8px;margin-top:8px}
.outro-row input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:white;font-family:'Barlow',sans-serif;font-size:16px;font-weight:600;outline:none}
/* CONFIRM */
.confirm-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:100vh;padding:40px 30px}
.confirm-icon{font-size:72px;margin-bottom:20px;animation:bounce 0.6s ease}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.confirm-title{font-family:'Bebas Neue',cursive;font-size:42px;letter-spacing:3px;margin-bottom:10px}
.confirm-sub{color:var(--gray2);font-size:15px;line-height:1.5;margin-bottom:12px}
/* ADMIN */
.admin-login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 30px}
.admin-lock{font-size:48px;margin-bottom:20px}
.admin-login-title{font-family:'Bebas Neue',cursive;font-size:32px;letter-spacing:3px;margin-bottom:8px}
.admin-screen{display:flex;flex-direction:column;min-height:100vh;padding-bottom:80px}
.admin-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px}
.admin-logo{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:2px;color:var(--red2)}
.admin-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--gray2);text-transform:uppercase;letter-spacing:1px;flex:1}
.logout-btn{background:none;border:1px solid var(--border);color:var(--gray2);padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.admin-content{flex:1;padding:16px 20px;overflow-y:auto}
.admin-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:1000}
.admin-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;background:none;border:none;color:var(--gray);font-family:'Barlow',sans-serif;font-size:10px;font-weight:600;cursor:pointer;text-transform:uppercase}
.admin-nav-btn.active{color:var(--red2)}
/* REQUEST CARD */
.request-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.request-card.has-pix{border-color:rgba(192,57,43,0.4);background:linear-gradient(135deg,#1a0808,#1e1e1e)}
.req-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.pix-badge{background:var(--red);color:white;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.req-name{font-weight:700;font-size:15px;flex:1}
.req-time{font-size:11px;color:var(--gray)}
.req-song{font-size:14px;color:var(--gray2);margin-bottom:4px}
.req-msg{font-size:13px;color:var(--gray2);font-style:italic;padding:6px 10px;background:var(--bg2);border-radius:6px;margin:8px 0}
.req-actions{display:flex;gap:8px;margin-top:10px}
.req-btn{flex:1;padding:8px;border-radius:8px;font-family:'Barlow',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border:none;text-transform:uppercase}
.req-played{background:rgba(39,174,96,0.15);color:#27ae60;border:1px solid rgba(39,174,96,0.3)}
.req-dismiss{background:var(--bg2);color:var(--gray);border:1px solid var(--border)}
/* ADMIN ITEMS */
.admin-pl-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.admin-pl-name{flex:1;font-weight:700;font-size:15px}
.toggle{width:44px;height:24px;background:var(--bg2);border:2px solid var(--border);border-radius:12px;position:relative;cursor:pointer}
.toggle::after{content:'';position:absolute;width:16px;height:16px;background:var(--gray);border-radius:50%;top:2px;left:2px;transition:all 0.2s}
.toggle.on{background:rgba(192,57,43,0.2);border-color:var(--red)}
.toggle.on::after{background:var(--red);transform:translateX(20px)}
.manage-btn{background:none;border:1px solid var(--border);color:var(--gray2);padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.admin-song-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.admin-song-info{flex:1}
.admin-song-title{font-weight:600;font-size:14px}
.admin-song-artist{font-size:12px;color:var(--gray2)}
.admin-song-item.hidden-song{opacity:0.45}
.add-form{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.add-form h4{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;color:var(--gray2);margin-bottom:12px}
.btn-add{width:100%;background:var(--red);color:white;border:none;border-radius:8px;padding:12px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;cursor:pointer}
.bulk-textarea{width:100%;background:var(--bg2);color:white;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'Barlow',sans-serif;font-size:13px;outline:none;resize:vertical}
.wish-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.wish-count{background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.3);color:var(--red2);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.pl-pills{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;margin-bottom:16px}
.pl-pill{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:6px 14px;color:var(--gray2);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.pl-pill.active{background:rgba(192,57,43,0.15);border-color:var(--red);color:var(--red2)}
.cfg-section{margin-bottom:24px}
.cfg-section h4{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;color:var(--gray);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.safe-row{display:flex;align-items:center;gap:12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:12px}
.safe-info{flex:1}
.safe-title{font-weight:600;font-size:15px}
.save-cfg-btn{width:100%;background:var(--red);color:white;border:none;border-radius:10px;padding:14px;font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px;cursor:pointer;margin-top:8px}
.qr-section{text-align:center;padding:20px 0}
#qr-container{display:inline-block;padding:16px;background:white;border-radius:12px;margin:16px auto}
.empty-state{text-align:center;padding:60px 20px;color:var(--gray)}
.loading{display:flex;align-items:center;justify-content:center;min-height:200px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast"></div>

<script>
// ==== PARA VOLTAR O SEU LOGO ====
// Substitua as aspas vazias abaixo pelo código gigante do seu logo em base64
const LOGO_DATA = '';

const firebaseConfig={apiKey:"SUA_API_KEY",authDomain:"SUA_AUTH_DOMAIN",projectId:"SEU_PROJECT_ID",storageBucket:"SEU_STORAGE_BUCKET",messagingSenderId:"SEU_MSG_ID",appId:"SEU_APP_ID"};
if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

let S={screen:'home',playlists:[],songs:{},allSongs:[],search:'',_plSearch:'',currentPlaylist:null,currentSong:null,requesterName:'',message:'',hasPix:false,pixAmount:0,pixCustom:'',showPixKey:false,requests:[],wishlist:[],isAdmin:false,adminTab:'requests',adminSongsPl:null,config:{safeMode:false,pixKey:'',suggestedAmounts:[10,20,50],instagram:'',whatsapp:''},_reqUnsub:null,_wishUnsub:null};

function render(){
  const r=document.getElementById('root');
  if(!r)return;
  let html='';
  if(S.screen==='home') html=renderHome();
  else if(S.screen==='playlist') html=renderPlaylist();
  else if(S.screen==='step1') html=renderStep1();
  else if(S.screen==='step2') html=renderStep2();
  else if(S.screen==='confirm') html=renderConfirm();
  else if(S.screen==='suggest') html=renderSuggest();
  else if(S.screen==='admin-login') html=renderAdminLogin();
  else if(S.screen==='admin') html=renderAdmin();
  r.innerHTML=html;
  attachEvents();
}
function goTo(sc,data={}){
  S.screen=sc;
  if(sc==='home'){S.search='';S._plSearch='';S.currentPlaylist=null;}
  if(data.currentPlaylist) S.currentPlaylist=data.currentPlaylist;
  window.scrollTo(0,0);
  render();
}
function goHome(){goTo('home');}
function goBackPl(){goTo('playlist');}
function goBackStep1(){goTo('step1');}
function toast(m){const t=document.getElementById('toast');if(!t)return;t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

// ═══ CLIENT SCREENS ═══
function renderHome(){
  const playlists=S.playlists.filter(p=>p.visible!==false).sort((a,b)=>(a.order||0)-(b.order||0));
  const t=Date.now()-30*24*60*60*1000;
  const recent=S.allSongs.filter(s=>s.visible!==false&&s.addedAt?.toMillis()>t);
  let resHtml='';
  if(S.search.length>1){
    const q=S.search.toLowerCase();
    const res=S.allSongs.filter(s=>s.visible!==false&&(s.title.toLowerCase().includes(q)||s.artist.toLowerCase().includes(q))).slice(0,15);
    resHtml=`<div class="search-results">${res.length>0?res.map(s=>'<div class="search-result-item" onclick="selectSong(\''+s.playlistId+'\',\''+s.id+'\')"><div class="search-result-info"><div class="search-result-title">'+s.title+'</div><div class="search-result-artist">'+s.artist+'</div></div><span class="search-result-pl">'+(s.playlistName||'Música')+'</span></div>').join(''):'<div class="empty-state">Música não encontrada.<br><button class="btn-secondary" onclick="goTo(\'suggest\')" style="margin-top:16px;max-width:200px">Sugerir Música</button></div>'}</div>`;
  }
  return `
    <div class="screen fade-in">
      <div class="home-header">
        ${LOGO_DATA ? '<img src="'+LOGO_DATA+'" class="logo-img" alt="SujeitoRock">' : '<div class="logo-img">SUJEITOROCK</div>'}
      </div>
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Buscar música ou artista..." value="${S.search}" oninput="S.search=this.value;render()">
      </div>
      ${S.search.length>1 ? resHtml : `
      <div class="section-title">Escolha um estilo</div>
      <div class="playlists-grid">
        ${recent.length>0?'<div class="playlist-card special" onclick="openRecent()"><span class="playlist-emoji">⚡</span><div class="playlist-name">Recém Adicionadas</div><div class="playlist-count">'+recent.length+' músicas</div></div>':''}
        ${playlists.map(pl=>'<div class="playlist-card" onclick="openPlaylist(\''+pl.id+'\')"><span class="playlist-emoji">'+(pl.emoji||'🎵')+'</span><div class="playlist-name">'+pl.name+'</div><div class="playlist-count">'+((S.songs[pl.id]||[]).filter(s=>s.visible!==false).length)+' músicas</div></div>').join('')}
      </div>`}
      <div class="home-footer">
        <div class="social-links">
          ${S.config.instagram?'<a href="'+S.config.instagram+'" target="_blank" class="social-btn">📷 Instagram</a>':''}
          ${S.config.whatsapp?'<a href="'+S.config.whatsapp+'" target="_blank" class="social-btn">💬 WhatsApp</a>':''}
        </div>
      </div>
    </div>`;
}

function renderPlaylist(){
  const pl=S.currentPlaylist;
  let sgs=(S.songs[pl.id]||[]).filter(s=>s.visible!==false);
  if(S._plSearch){const q=S._plSearch.toLowerCase();sgs=sgs.filter(s=>s.title.toLowerCase().includes(q)||s.artist.toLowerCase().includes(q));}
  return `
    <div class="screen fade-in">
      <div class="screen-header">
        <button class="back-btn" onclick="goHome()">←</button>
        <div class="screen-header-info">
          <div class="screen-header-title">${pl.emoji||'🎵'} ${pl.name}</div>
        </div>
      </div>
      <div class="playlist-search"><input type="text" placeholder="Buscar nesta lista..." value="${S._plSearch}" oninput="S._plSearch=this.value;render()"></div>
      <div class="songs-list">

function openPlaylist(plId){const pl=S.playlists.find(p=>p.id===plId);if(!pl)return;S._plSearch='';goTo('playlist',{currentPlaylist:pl});}
function openRecent(){const t=Date.now()-30*24*60*60*1000;const r=S.allSongs.filter(s=>s.visible!==false&&s.addedAt?.toMillis()>t);S.currentPlaylist={id:'__recent__',name:'Recém Adicionadas',emoji:'⚡'};S.songs['__recent__']=r;S._plSearch='';S.screen='playlist';render();}
function selectSong(plId,sId){const s=(S.songs[plId]||[]).find(x=>x.id===sId);if(!s)return;S.currentSong=s;S.requesterName='';S.message='';S.pixAmount=0;S.hasPix=false;S.showPixKey=false;S.pixCustom='';goTo('step1');}
function selectAmt(a){S.pixAmount=a;S.showPixKey=false;render();}
function showPix(){S.showPixKey=true;render();}
function copyPix(){
  const k=S.config.pixKey;
  const el=document.createElement('textarea');
  el.value=k;
  el.style.position='fixed';
  el.style.top='0';
  document.body.appendChild(el);
  el.focus();
  el.select();
  try{document.execCommand('copy');toast('Chave Pix copiada! 📋');}catch(e){toast('Erro ao copiar.');}
  document.body.removeChild(el);
}
async function confirmPix(hasPix){
  S.hasPix=hasPix;
  const amt=hasPix?(S.pixAmount===-1?parseInt(S.pixCustom)||0:S.pixAmount):0;
  toast('Enviando...');
  try{await db.collection('requests').add({songTitle:S.currentSong.title,songArtist:S.currentSong.artist,playlistId:S.currentSong.playlistId,requesterName:S.requesterName.trim()||'Anônimo',message:S.message.trim(),hasPix,pixAmount:amt,status:'pending',createdAt:firebase.firestore.FieldValue.serverTimestamp()});goTo('confirm');}
  catch(e){toast('Erro ao enviar.');}
}
async function submitSuggest(){
  const title=document.getElementById('sg-title')?.value.trim();
  const artist=document.getElementById('sg-artist')?.value.trim();
  const name=document.getElementById('sg-name')?.value.trim();
  if(!title||!artist){toast('Preenche o nome da música e o artista!');return;}
  toast('Enviando...');
  try{
    const ex=S.wishlist.find(w=>w.title.toLowerCase()===title.toLowerCase()&&w.artist.toLowerCase()===artist.toLowerCase());
    if(ex)await db.collection('wishlist').doc(ex.id).update({count:firebase.firestore.FieldValue.increment(1),updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    else await db.collection('wishlist').add({title,artist,count:1,requestedBy:name||'Anônimo',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    toast('Sugestão enviada! 🎸');setTimeout(()=>goHome(),1200);
  }catch(e){toast('Erro ao enviar.');}
}

let initialReqCount = -1;
function listenReqs(){
  if(S._reqUnsub) S._reqUnsub();
  S._reqUnsub=db.collection('requests').where('status','in',['pending']).orderBy('createdAt','asc').onSnapshot(snap=>{
    const newReqs = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(initialReqCount === -1) {
       initialReqCount = newReqs.length;
    } else if(newReqs.length > initialReqCount) {
       notifyAdmin('🎵 Novo Pedido de Música!', 'Acesse o painel para ver.');
       initialReqCount = newReqs.length;
    } else {
       initialReqCount = newReqs.length;
    }
    S.requests = newReqs;
    if(S.screen==='admin'&&S.adminTab==='requests') renderAdmin();
  });
}

function listenWish(){
  if(S._wishUnsub) S._wishUnsub();
  S._wishUnsub=db.collection('wishlist').onSnapshot(snap=>{S.wishlist=snap.docs.map(d=>({id:d.id,...d.data()}));if(S.screen==='admin'&&S.adminTab==='wishlist')renderAdmin();});
}

function requestNotifPerm(){
  if('Notification' in window && Notification.permission !== 'granted' && Notification.permission !== 'denied'){
    Notification.requestPermission();
  }
}
function notifyAdmin(title, body){
  if('Notification' in window && Notification.permission === 'granted'){
    new Notification(title, {body});
  }
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    osc.connect(ctx.destination);
    osc.frequency.value = 850;
    osc.start();
    osc.stop(ctx.currentTime + 0.3);
  }catch(e){}
}

async function loadConfig(){
  try{const c=await db.collection('config').doc('main').get();if(c.exists)S.config={...S.config,...c.data()};}catch(e){}
}
async function loadPlaylists(){
  try{
    const p=await db.collection('playlists').get();
    S.playlists=p.docs.map(d=>({id:d.id,...d.data()}));
    for(let pl of S.playlists){
      const s=await db.collection('playlists').doc(pl.id).collection('songs').get();
      const sgs=s.docs.map(d=>({id:d.id,playlistId:pl.id,playlistName:pl.name,...d.data()}));
      S.songs[pl.id]=sgs; S.allSongs.push(...sgs);
    }
    if(S.screen==='home'||S.screen==='playlist') render();
  }catch(e){}
}

async function togglePl(id){const pl=S.playlists.find(p=>p.id===id);if(!pl)return;pl.visible=!pl.visible;try{await db.collection('playlists').doc(id).update({visible:pl.visible});renderAdmin();}catch(e){}}
async function toggleSong(plId,sId){const s=S.songs[plId].find(x=>x.id===sId);if(!s)return;s.visible=!s.visible;try{await db.collection('playlists').doc(plId).collection('songs').doc(sId).update({visible:s.visible});renderAdmin();}catch(e){}}

async function addPlaylist(){
  const emoji=document.getElementById('new-pl-emoji')?.value.trim()||'🎵';
  const name=document.getElementById('new-pl-name')?.value.trim();
  if(!name){toast('Digite o nome!');return;}
  toast('Criando...');
  try{const ref=await db.collection('playlists').add({name,emoji,visible:true,order:S.playlists.length,createdAt:firebase.firestore.FieldValue.serverTimestamp()});S.playlists.push({id:ref.id,name,emoji,visible:true,order:S.playlists.length});S.songs[ref.id]=[];toast('Playlist criada! 🎵');renderAdmin();}catch(e){toast('Erro.');}
}

async function addSong(){
  const title=document.getElementById('new-s-title')?.value.trim();
  const artist=document.getElementById('new-s-artist')?.value.trim();
  const plId=S.adminSongsPl;
  if(!title||!artist){toast('Preenche o nome e o artista!');return;}
  if(!plId){toast('Selecione uma playlist!');return;}
  toast('Salvando...');
  try{
    const ref=await db.collection('playlists').doc(plId).collection('songs').add({title,artist,visible:true,addedAt:firebase.firestore.FieldValue.serverTimestamp()});
    const ns={id:ref.id,title,artist,visible:true,playlistId:plId,playlistName:S.playlists.find(p=>p.id===plId)?.name};
    if(!S.songs[plId])S.songs[plId]=[];S.songs[plId].push(ns);S.allSongs.push(ns);
    document.getElementById('new-s-title').value=''; // mantem o artista!
    toast('Música adicionada! 🎤');renderAdmin();
  }catch(e){toast('Erro ao adicionar.');}
}

async function addBulkSongs(){
  const txt = document.getElementById('bulk-songs')?.value.trim();
  const plId = S.adminSongsPl;
  if(!txt){toast('Cole a lista de músicas!');return;}
  if(!plId){toast('Selecione uma playlist!');return;}
  const lines = txt.split('\n');
  let added = 0;
  toast('Adicionando lista...');
  for(let line of lines){
    line = line.trim();
    if(!line) continue;
    const parts = line.split('-');
    const title = parts[0].trim();
    const artist = parts.slice(1).join('-').trim() || 'Desconhecido';
    if(title){
      try{
        const ref=await db.collection('playlists').doc(plId).collection('songs').add({title,artist,visible:true,addedAt:firebase.firestore.FieldValue.serverTimestamp()});
        const ns={id:ref.id,title,artist,visible:true,playlistId:plId,playlistName:S.playlists.find(p=>p.id===plId)?.name};
        if(!S.songs[plId])S.songs[plId]=[];
        S.songs[plId].push(ns);S.allSongs.push(ns);
        added++;
      }catch(e){}
    }
  }
  document.getElementById('bulk-songs').value='';
  toast(added+' músicas adicionadas! 🎤');
  renderAdmin();
}

function toggleSafe(){S.config.safeMode=!S.config.safeMode;const t=document.getElementById('safe-toggle');if(t)t.classList.toggle('on',S.config.safeMode);}

async function saveConfig(){
  const pix=document.getElementById('cfg-pix')?.value.trim();
  const amts=document.getElementById('cfg-amounts')?.value.trim();
  const insta=document.getElementById('cfg-insta')?.value.trim();
  const whats=document.getElementById('cfg-whats')?.value.trim();
  const amounts=amts.split(',').map(a=>parseInt(a.trim())).filter(a=>!isNaN(a));
  S.config={...S.config,pixKey:pix,suggestedAmounts:amounts,instagram:insta,whatsapp:whats};
  toast('Salvando...');
  try{await db.collection('config').doc('main').set(S.config);toast('Configurações salvas! ✅');}catch(e){toast('Erro ao salvar.');}
}

function genQR(){
  const c=document.getElementById('qr-container');if(!c)return;
  const url='https://app.sujeitorock.com.br';
  c.innerHTML='<img src="https://chart.googleapis.com/chart?chs=180x180&cht=qr&chl='+encodeURIComponent(url)+'&choe=UTF-8" style="width:180px;height:180px;border-radius:8px" alt="QR Code"><br><a href="https://chart.googleapis.com/chart?chs=400x400&cht=qr&chl='+encodeURIComponent(url)+'&choe=UTF-8" download="qr-sujeitorock.png" style="color:var(--red2);font-size:12px;text-decoration:none;display:inline-block;margin-top:8px">⬇️ Baixar QR Code</a>';
}

function attachEvents(){
  const lp=document.getElementById('login-pass');
  if(lp) lp.addEventListener('keydown',e=>{if(e.key==='Enter') doLogin();});
}

// ═══ BOOT ═══
auth.onAuthStateChanged(user => {
  if(user) {
    S.isAdmin = true;
    S.adminTab = 'requests';
    if(initialReqCount === -1) initialReqCount = -1; // reset on login
    listenReqs();
    listenWish();
    requestNotifPerm();
    if(S.screen !== 'admin') goTo('admin'); // Mantém logado no painel ao recarregar
  } else {
    if(window.location.hash === '#admin') goTo('admin-login');
  }
});

async function init(){
  await loadConfig();
  render();
  loadPlaylists();
  if(window.location.hash==='#admin' && !S.isAdmin) goTo('admin-login');
}
init();
</script>
